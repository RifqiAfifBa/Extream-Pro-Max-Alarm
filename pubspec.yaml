name: smart_alarm_ai
description: "Smart Alarm AI - Puzzle-based alarm with sleep analytics"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications & Alarms
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^3.0.3

  # Audio
  audioplayers: ^6.1.0

  # QR Scanner
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.10
  intl: ^0.19.0
  uuid: ^4.5.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
