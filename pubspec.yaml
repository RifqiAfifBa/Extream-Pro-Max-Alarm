name: xalarm
description: 'XAlarm - Premium Smart Alarm App'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1

  # Audio
  audioplayers: ^6.1.0

  # UI & Fonts
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/audio/
